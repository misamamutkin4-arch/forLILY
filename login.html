<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — LensAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <header class="site-header glass-panel">
    <a class="logo" href="index.html"><span class="logo-mark">◌</span><span>LensAI</span></a>
    <nav class="main-nav" aria-label="Главная навигация"><a href="index.html#features">Возможности</a><a href="index.html#compatibility">Устройства</a><a href="index.html#install">Установка</a><a href="index.html#pricing">Тарифы</a></nav>
    <div class="header-actions"><a class="ghost-link" href="login.html">Войти</a><a class="small-button" href="register.html">Начать</a></div>
  </header>

  <main class="auth-main">
    <section class="auth-card glass-panel reveal">
      <p class="eyebrow">С возвращением</p>
      <h1>Войти в LensAI</h1>
      <form class="auth-form" id="login-form">
        <label>Email<input type="email" id="login-email" name="email" placeholder="you@example.com" required /></label>
        <label>Пароль<input type="password" id="login-password" name="password" placeholder="••••••••" required minlength="6" /></label>
        <button class="primary-button full" type="submit">Войти</button>
      </form>
      <p class="auth-switch">Нет аккаунта? <a href="register.html">Регистрация</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <a class="logo" href="index.html"><span class="logo-mark">◌</span><span>LensAI</span></a>
    <p>Персональный AI-агент для существующих умных очков. Мы создаём операционную платформу, а не производим железо.</p>
    <nav aria-label="Навигация в футере"><a href="index.html#features">Возможности</a><a href="login.html">Вход</a><a href="register.html">Регистрация</a></nav>
  </footer>

  <script src="script.js"></script>
</body>
</html>
